name: run-tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['11', '12', '13']
        dependency-version: [lowest, highest]
        include:
          - laravel: '11'
            testbench: '^9.5'
          - laravel: '12'
            testbench: '^10.0'
          - laravel: '13'
            testbench: '^11.0'
        exclude:
          # Laravel 13 requires PHP 8.3+
          - laravel: '13'
            php: '8.2'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.dependency-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Constrain testbench to the matrix version
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-interaction --no-update

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: ${{ matrix.dependency-version }}

      - name: Run tests
        run: vendor/bin/phpunit
